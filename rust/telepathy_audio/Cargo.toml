[package]
name = "telepathy_audio"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["lib"]

[dependencies]
cpal = { version = "0.17", features = ["wasm-bindgen", "audioworklet"] }
kanal = "0.1.1"
rubato = { version = "0.16", default-features = false }
nnnoiseless = { version = "0.5", default-features = false }
atomic_float = "1"
tokio-util = { version = "0.7", features = ["codec", "compat"] }
sea-codec = { path = "../sea_codec" }
log = "0.4"
cfg-if = "1"

[target.'cfg(target_family = "wasm")'.dependencies]
tokio = { version = "1", features = ["time", "io-util", "macros", "rt"] }
web-sys = { version = "0.3", features = [
    "AudioContext",
    "MediaDevices",
    "MediaStreamConstraints",
    "MediaStream",
    "MediaStreamAudioSourceNode",
    "MediaStreamTrack",
    "AudioWorklet",
    "AudioWorkletNode",
    "BaseAudioContext",
    "MessagePort",
    "MediaStreamAudioDestinationNode",
    "MessageEvent",
    "console",
    "Url",
    "BlobPropertyBag",
    "Blob",
    "Navigator",
    "Window"
] }
wasm-bindgen = "0.2"
js-sys = "0.3"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
tokio = { version = "1", features = ["time", "io-util", "macros", "process", "net", "rt-multi-thread", "fs"] }
