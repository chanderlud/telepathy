services:
  iroh-relay:
    image: n0computer/iroh-relay:v1.0.0-rc.1
    network_mode: host
    volumes:
      - ./relay/config.toml:/config/config.toml:ro
      - ./relay/certs:/certs:ro
    command: ["--config-path=/config/config.toml", "--dev"]

  iroh-dns-server:
    image: n0computer/iroh-dns-server:v1.0.0-rc.1
    network_mode: host
    volumes:
      - ./dns/config.dev.toml:/config/config.dev.toml:ro
    command: ["--config", "/config/config.dev.toml"]
