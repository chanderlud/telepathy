name: call_simultaneous_dial
steps:
  # --- bootstrap ---
  - actor: alice
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: bob
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: alice
    send:
      cmd: add_contact
      args:
        contact_id: bob
        peer_id: ${bob.peer_id}
    expect_ack:
      ok: true
  - actor: bob
    send:
      cmd: add_contact
      args:
        contact_id: alice
        peer_id: ${alice.peer_id}
    expect_ack:
      ok: true

  # --- establish sessions (concurrent) ---
  - concurrent:
      - actor: alice
        send:
          cmd: start_session
          args:
            contact_id: bob
        expect_ack:
          ok: true
      - actor: bob
        send:
          cmd: start_session
          args:
            contact_id: alice
        expect_ack:
          ok: true

  # wait for both sessions to reach Connected
  - actor: alice
    expect_event:
      type: session_status
      timeout: 45.0
      match:
        status: Connected
        peer: ${bob.peer_id}
  - actor: bob
    expect_event:
      type: session_status
      timeout: 45.0
      match:
        status: Connected
        peer: ${alice.peer_id}

  # --- simultaneous call (DESIRED: both get Connected, no prompts, no deadlock) ---
  - concurrent:
      - actor: alice
        send:
          cmd: start_call
          args:
            contact_id: bob
        expect_ack:
          ok: true
      - actor: bob
        send:
          cmd: start_call
          args:
            contact_id: alice
        expect_ack:
          ok: true

  # DESIRED: both actors receive call_state Connected without any accept_call_prompt.
  # If a prompt were emitted, this expect_event would timeout waiting for call_state -> test fails.
  # If the call failed, state would not be Connected -> test fails.
  - actor: alice
    expect_event:
      type: call_state
      timeout: 20.0
      match:
        state: Connected
  - actor: bob
    expect_event:
      type: call_state
      timeout: 20.0
      match:
        state: Connected
