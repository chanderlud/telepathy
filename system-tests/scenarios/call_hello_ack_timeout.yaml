name: call_hello_ack_timeout
steps:
  # --- bootstrap ---
  - actor: alice
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: bob
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: alice
    send:
      cmd: add_contact
      args:
        contact_id: bob
        peer_id: ${bob.peer_id}
    expect_ack:
      ok: true
  - actor: bob
    send:
      cmd: add_contact
      args:
        contact_id: alice
        peer_id: ${alice.peer_id}
    expect_ack:
      ok: true

  # --- establish sessions ---
  - concurrent:
      - actor: alice
        send:
          cmd: start_session
          args:
            contact_id: bob
        expect_ack:
          ok: true
      - actor: bob
        send:
          cmd: start_session
          args:
            contact_id: alice
        expect_ack:
          ok: true

  - actor: alice
    expect_event:
      type: session_status
      timeout: 45.0
      match:
        status: Connected
        peer: ${bob.peer_id}
  - actor: bob
    expect_event:
      type: session_status
      timeout: 45.0
      match:
        status: Connected
        peer: ${alice.peer_id}

  # --- alice calls; bob never answers the accept prompt ---
  - actor: alice
    send:
      cmd: start_call
      args:
        contact_id: bob
    expect_ack:
      ok: true

  - actor: bob
    expect_event:
      type: accept_call_prompt
      timeout: 20.0
      match:
        contact_id: alice

  # alice should receive CallEnded when bob never responds to Hello
  - actor: alice
    expect_event:
      type: call_state
      timeout: 15.0
      match:
        state: CallEnded
