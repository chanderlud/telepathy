name: session_simultaneous_dial
steps:
  - actor: alice
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: bob
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: alice
    send:
      cmd: start_manager
      args: {}
    expect_ack:
      ok: true
  - actor: bob
    send:
      cmd: start_manager
      args: {}
    expect_ack:
      ok: true
  - actor: alice
    expect_event:
      type: manager_active
      timeout: 10.0
      match:
        active: true
  - actor: bob
    expect_event:
      type: manager_active
      timeout: 10.0
      match:
        active: true
  - actor: alice
    send:
      cmd: add_contact
      args:
        contact_id: bob
        peer_id: ${bob.peer_id}
    expect_ack:
      ok: true
  - actor: bob
    send:
      cmd: add_contact
      args:
        contact_id: alice
        peer_id: ${alice.peer_id}
    expect_ack:
      ok: true
  - concurrent:
      - actor: alice
        send:
          cmd: start_session
          args:
            contact_id: bob
        expect_ack:
          ok: true
      - actor: bob
        send:
          cmd: start_session
          args:
            contact_id: alice
        expect_ack:
          ok: true
  - actor: alice
    expect_event:
      type: session_status
      timeout: 20.0
      match:
        status:
          - Connecting
          - Connected
  - actor: bob
    expect_event:
      type: session_status
      timeout: 20.0
      match:
        status:
          - Connecting
          - Connected
  - actor: alice
    expect_event:
      type: session_status
      timeout: 25.0
      match:
        status: Connected
        peer: ${bob.peer_id}
  - actor: bob
    expect_event:
      type: session_status
      timeout: 25.0
      match:
        status: Connected
        peer: ${alice.peer_id}
