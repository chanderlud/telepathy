name: smoke_manager
steps:
  - actor: alice
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: alice
    send:
      cmd: start_manager
      args: {}
    expect_ack:
      ok: true
  - actor: alice
    expect_event:
      type: manager_active
      timeout: 10.0
      match:
        active: true
