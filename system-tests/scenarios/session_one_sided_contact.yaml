name: session_one_sided_contact
steps:
  - actor: alice
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: bob
    expect_event:
      type: ready
      timeout: 10.0
      match:
        version: "*"
  - actor: alice
    send:
      cmd: add_contact
      args:
        contact_id: bob
        peer_id: ${bob.peer_id}
    expect_ack:
      ok: true
  - actor: alice
    send:
      cmd: start_session
      args:
        contact_id: bob
    expect_ack:
      ok: true
  - actor: alice
    expect_event:
      type: session_status
      timeout: 10.0
      match:
        status:
          - Connecting
  - actor: bob
    send:
      cmd: add_contact
      args:
        contact_id: alice
        peer_id: ${alice.peer_id}
    expect_ack:
      ok: true
  - actor: bob
    expect_event:
      type: session_status
      timeout: 20.0
      match:
        status:
          - Connecting
          - Connected
        peer: ${alice.peer_id}
  - actor: alice
    expect_event:
      type: session_status
      timeout: 20.0
      match:
        status: Connected
        peer: ${bob.peer_id}
